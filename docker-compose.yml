# Gmail Expense Tracker - Docker Compose
#
# Option 1 (Neon): Set DATABASE_URL in backend/.env to Neon connection string.
#   docker compose up -d
#
# Option 2 (Local DB): Use profile 'db' to include Postgres.
#   docker compose --profile db up -d
#
# Requires backend/.env: DATABASE_URL, GOOGLE_*, JWT_SECRET, ENCRYPTION_KEY, FRONTEND_URL, CORS_ORIGINS

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env
    environment:
      - PORT=8000
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: ${VITE_API_URL:-http://localhost:8000}
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: unless-stopped

  # Local Postgres - use with: docker compose --profile db up -d
  # Set DATABASE_URL=postgresql://expense_tracker:expense_tracker_secret@db:5432/expense_tracker in backend/.env
  db:
    image: postgres:16-alpine
    profiles:
      - db
    environment:
      POSTGRES_USER: expense_tracker
      POSTGRES_PASSWORD: expense_tracker_secret
      POSTGRES_DB: expense_tracker
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U expense_tracker"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
